name: Scene Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scene-tests:
    name: gdUnit4 Scene Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Downloads Godot, runs gdUnit4 tests headlessly via Xvfb.
      # If 4.7.0 isn't a listed stable release yet, change godot-status to 'dev' or 'rc'.
      - uses: MikeSchulze/gdUnit4-action@v1
        with:
          godot-version: '4.7.0'
          godot-status: 'stable'
          godot-net: 'true'
          paths: |
            res://scene_tests/
          timeout: 10
          report-name: scene-test-report

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scene-test-report
          path: reports/
